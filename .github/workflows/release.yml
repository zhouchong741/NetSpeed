name: Release

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: macos-13
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Toolchain
        run: |
          sw_vers
          swift --version

      - name: Build App
        run: ./scripts/build_app.sh

      - name: Verify Intel Binary
        run: |
          file dist/NetSpeed.app/Contents/MacOS/NetSpeed
          archs="$(lipo -archs dist/NetSpeed.app/Contents/MacOS/NetSpeed)"
          if [[ "$archs" != *"x86_64"* ]]; then
            echo "Expected x86_64 arch in app binary, got: $archs" >&2
            exit 1
          fi

      - name: Resolve Release Tag
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            version="${{ github.event.release.tag_name }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "VERSION_TAG=${version}" >> "$GITHUB_ENV"
          echo "Using tag: ${version}"

      - name: Package DMG
        run: |
          asset="NetSpeed-${VERSION_TAG}-macos-intel.dmg"
          hdiutil create -volname "NetSpeed" -srcfolder dist/NetSpeed.app -ov -format UDZO "dist/${asset}"
          shasum -a 256 "dist/${asset}" > "dist/checksums.txt"

      - name: Create Or Update Release
        run: |
          asset="dist/NetSpeed-${VERSION_TAG}-macos-intel.dmg"
          if gh release view "${VERSION_TAG}" >/dev/null 2>&1; then
            gh release upload "${VERSION_TAG}" "${asset}" "dist/checksums.txt" --clobber
          else
            gh release create "${VERSION_TAG}" "${asset}" "dist/checksums.txt" \
              --title "${VERSION_TAG}" \
              --generate-notes
          fi
